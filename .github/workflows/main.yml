name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          pip install pypiwin32
        fi
      shell: bash

    - name: Remove cross-platform binaries
      run: |
        if [ "${{ matrix.os }}" == "macos-latest" ]; then
          rm -f static/hidapitester/*-windows-* static/hidapitester/*-linux-*
          rm -f static/uniclip/*-windows-* static/uniclip/*-linux-*
        elif [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
          rm -f static/hidapitester/*-windows-* static/hidapitester/*-macos-*
          rm -f static/uniclip/*-windows-* static/uniclip/*-macos-*
        elif [ "${{ matrix.os }}" == "windows-latest" ]; then
          rm -f static/hidapitester/*-linux-* static/hidapitester/*-macos-*
          rm -f static/uniclip/*-linux-* static/uniclip/*-macos-*
        fi
      shell: bash

    - name: Build application
      run: |
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          python -m PyInstaller --onedir --windowed --add-data "static/icon;static/icon" --add-data "static/hidapitester;static/hidapitester" --add-data "static/uniclip;static/uniclip" --icon static/icon/icon.ico --name logitech_channel_switcher src/main.py
        else
          pyinstaller --onedir --windowed --add-data "static/icon:static/icon" --add-data "static/hidapitester:static/hidapitester" --add-data "static/uniclip:static/uniclip" --icon static/icon/icon.icns --name logitech_channel_switcher src/main.py
        fi
      shell: bash

    - name: Import Apple signing certificate
      if: matrix.os == 'macos-latest'
      env:
        APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      run: |
        # Create temporary keychain
        KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
        KEYCHAIN_PASSWORD=$(openssl rand -hex 12)
        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        # Import certificate
        echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
        security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
          -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
        security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

    - name: Sign macOS app
      if: matrix.os == 'macos-latest'
      env:
        APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      run: |
        # Sign all binaries inside the app bundle
        find dist/logitech_channel_switcher.app -type f \( -name "*.dylib" -o -name "*.so" -o -perm +111 \) \
          -exec codesign --force --options runtime --sign "$APPLE_SIGNING_IDENTITY" --timestamp {} \;

        # Sign the main executable
        codesign --force --options runtime --sign "$APPLE_SIGNING_IDENTITY" --timestamp \
          dist/logitech_channel_switcher.app/Contents/MacOS/logitech_channel_switcher

        # Sign the app bundle itself
        codesign --force --options runtime --sign "$APPLE_SIGNING_IDENTITY" --timestamp \
          dist/logitech_channel_switcher.app

        # Verify
        codesign --verify --deep --strict dist/logitech_channel_switcher.app
        echo "Code signing verified successfully"

    - name: Create macOS DMG
      if: matrix.os == 'macos-latest'
      run: |
        brew install create-dmg
        create-dmg \
          --volname "Logitech Channel Switcher" \
          --volicon "static/icon/icon.icns" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --icon "logitech_channel_switcher.app" 175 190 \
          --app-drop-link 425 190 \
          "logitech_channel_switcher.dmg" \
          "dist/logitech_channel_switcher.app" \
          || test $? -eq 2

    - name: Sign macOS DMG
      if: matrix.os == 'macos-latest'
      env:
        APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      run: |
        codesign --force --sign "$APPLE_SIGNING_IDENTITY" --timestamp logitech_channel_switcher.dmg
        codesign --verify logitech_channel_switcher.dmg
        echo "DMG signed successfully"

    - name: Cleanup keychain
      if: matrix.os == 'macos-latest' && always()
      run: |
        security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true

    - name: Create Windows installer
      if: matrix.os == 'windows-latest'
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.4
      with:
        path: installer/windows/setup.iss

    - name: Create Linux package
      if: matrix.os == 'ubuntu-latest'
      run: |
        mkdir -p package
        cp -r dist/logitech_channel_switcher package/
        cp installer/linux/install.sh package/
        cp installer/linux/uninstall.sh package/
        chmod +x package/install.sh package/uninstall.sh
        cd package
        tar -czf ../logitech_channel_switcher-linux-x64.tar.gz .

    - name: Upload macOS artifact
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: logitech_channel_switcher-macos
        path: logitech_channel_switcher.dmg

    - name: Upload Windows artifact
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: logitech_channel_switcher-windows
        path: installer/windows/output/logitech_channel_switcher_setup.exe

    - name: Upload Linux artifact
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: logitech_channel_switcher-linux
        path: logitech_channel_switcher-linux-x64.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/

    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/logitech_channel_switcher-macos/logitech_channel_switcher.dmg
          artifacts/logitech_channel_switcher-windows/logitech_channel_switcher_setup.exe
          artifacts/logitech_channel_switcher-linux/logitech_channel_switcher-linux-x64.tar.gz
